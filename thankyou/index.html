<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>Portal Tetamu | D'Anjung Cottage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    /* Full screen tanpa scrollbar luar */
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f1f5f9; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    
    /* Loading Spinner ringkas sementara IFrame loading */
    #loader {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: sans-serif; color: #64748b;
    }
  </style>
</head>
<body>

  <div id="loader">Memuatkan Portal...</div>
  <iframe id="portalFrame" src="about:blank"></iframe>

  <script>
    window.onload = function() {
      // 1. Tangkap parameter dari URL (Contoh: ?ref=HR123&phone=012...)
      const urlParams = new URLSearchParams(window.location.search);
      const ref = urlParams.get('ref') || "";
      const phone = urlParams.get('phone') || "";
      
      // 2. URL Deployment Google Apps Script anda yang terkini
      const scriptURL = "https://script.google.com/macros/s/AKfycbyvAp_ajmDPtRiz4pphOHi1cOzbGdu4qjlcydM7MacL6yZnq7y7OGyKwfOJyGzYgYNh/exec";
      
      // 3. Bina URL IFrame (Gunakan mode=portal supaya dia auto-search)
      // Kita gunakan '?' untuk parameter pertama, dan '&' untuk yang seterusnya
      const finalIframeSrc = `${scriptURL}?mode=portal&ref=${encodeURIComponent(ref)}&phone=${encodeURIComponent(phone)}`;
      
      // 4. Masukkan ke dalam IFrame & sorok loader
      const frame = document.getElementById('portalFrame');
      frame.src = finalIframeSrc;
      
      frame.onload = function() {
        document.getElementById('loader').style.display = 'none';
      };
    };
  </script>

</body>
</html>
