<script>
  // 1. Ambil Parameter dari URL GitHub (e.g. ?ref=HRTEST123&phone=0123456789)
  const urlParams = new URLSearchParams(window.location.search);
  const bookingRef = urlParams.get('ref');
  const guestPhone = urlParams.get('phone');

  // 2. Alamat Apps Script Baru Anda
  const scriptURL = "https://script.google.com/macros/s/AKfycbzA4eboL1zkvRmzWN5P5yMYvlxPHYJxneVv7q_v5cwooC4yoaAbLs1czynWvrKqTWIu/exec";

  // 3. Fungsi Ambil Data dari Google Sheet (via Apps Script)
  async function fetchBookingData() {
    if (!bookingRef) return;

    try {
      // Panggil Apps Script mode=thanks untuk dapatkan data JSON/HTML
      const response = await fetch(`${scriptURL}?mode=thanks&ref=${bookingRef}&phone=${guestPhone}`);
      const data = await response.text();
      
      // Masukkan hasil ke dalam div di GitHub
      document.getElementById('booking-content').innerHTML = data;
    } catch (error) {
      console.error("Gagal menarik data:", error);
      document.getElementById('booking-content').innerText = "Ralat memuatkan data. Sila cuba lagi.";
    }
  }

  window.onload = fetchBookingData;
</script>

<div id="booking-content">Memuatkan butiran tempahan D'Anjung Cottage...</div>
