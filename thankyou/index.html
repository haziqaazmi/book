<!DOCTYPE html>
<html>
<head>
  <title>Thank You | D'Anjung Cottage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    iframe { width: 100vw; height: 100vh; border: none; }
  </style>
</head>
<body>
  <iframe id="portalFrame" src=""></iframe>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const ref = urlParams.get('ref');
    const phone = urlParams.get('phone');
    
    // Alamat Apps Script (URL yang anda berikan tadi)
    const scriptBase = "https://script.google.com/macros/s/AKfycbw2_wUfs50My4WUxL9EBe0Hq3Kst_trolw3ilzng_oPWW62z7NCs86ValF2PKhvJt5Y/exec";
    
    // Bina URL lengkap dengan mode=thanks
    const finalURL = `${scriptBase}?mode=thanks&ref=${ref}&phone=${phone}`;
    
    document.getElementById('portalFrame').src = finalURL;
  </script>
</body>
</html>
