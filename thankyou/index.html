<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>Portal Tetamu | D'Anjung Cottage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    /* Menghilangkan scrollbar pada body supaya nampak macam Apps asli */
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f8fafc; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <iframe id="portalFrame" src="about:blank"></iframe>

  <script>
    // 1. Ambil data dari URL browser (book.danjungcottage.com/thankyou?ref=...&phone=...)
    const urlParams = new URLSearchParams(window.location.search);
    const ref = urlParams.get('ref') || "";
    const phone = urlParams.get('phone') || "";
    
    // 2. URL Asal Apps Script anda
    const scriptID = "AKfycbw2_wUfs50My4WUxL9EBe0Hq3Kst_trolw3ilzng_oPWW62z7NCs86ValF2PKhvJt5Y";
    const scriptBase = `https://script.google.com/macros/s/${scriptID}/exec`;
    
    // 3. Tentukan mode (Jika ada ref & phone, kita terus ke mode=portal supaya dia auto-search)
    // Gunakan '&' untuk menyambung parameter, bukan '?' dua kali.
    const finalURL = `${scriptBase}?mode=portal&ref=${encodeURIComponent(ref)}&phone=${encodeURIComponent(phone)}`;
    
    // 4. Masukkan ke dalam IFrame
    document.getElementById('portalFrame').src = finalURL;
  </script>
</body>
</html>
